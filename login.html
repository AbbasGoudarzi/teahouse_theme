<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- viewport برای رفتار صحیح Mobile-First و PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#084738">
    <title>ورود | مدیریت چایخانه</title>

    <!-- ===== Bootstrap 5 RTL (محلی) ===== -->
    <link href="assets/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- ===== Bootstrap Icons (محلی) ===== -->
    <link rel="stylesheet" href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css">
    <!-- ===== فونت وزیرمتن (محلی) ===== -->
    <link href="assets/vendor/vazirmatn/vazirmatn.css" rel="stylesheet">
    <!-- ===== استایل مشترک پروژه ===== -->
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body class="login-body">

<!-- ================= Wrapper صفحه ورود (عرض موبایل) ================= -->
<div class="login-wrapper">

    <!-- ============ برندینگ بالای فرم ============ -->
    <div class="login-brand">
        <div class="brand-logo">
            <i class="bi bi-cup-hot-fill"></i>
        </div>
        <h1 class="brand-title">مدیریت چایخانه</h1>
        <div class="brand-sub">پنل مدیریت پرسنل و شیفت‌ها</div>
    </div>

    <!-- ============ کارت فرم ورود ============ -->
    <div class="login-card">
        <h2 class="login-heading">ورود به حساب</h2>
        <p class="login-desc">برای ادامه، شماره موبایل و رمز عبور خود را وارد کنید.</p>

        <form id="loginForm" novalidate>

            <!-- فیلد شماره موبایل -->
            <div class="login-field">
                <label for="mobile" class="form-label">شماره موبایل</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-phone"></i></span>
                    <input type="tel" class="form-control" id="mobile" name="mobile"
                           inputmode="numeric" maxlength="11" placeholder="۰۹۱۲۳۴۵۶۷۸۹"
                           autocomplete="tel" required>
                </div>
            </div>

            <!-- فیلد رمز عبور -->
            <div class="login-field">
                <label for="password" class="form-label">رمز عبور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••" autocomplete="current-password" required>
                    <button class="btn toggle-pass" type="button" id="togglePass"
                            aria-label="نمایش رمز عبور">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- دکمه ورود -->
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-left"></i>
                ورود
            </button>

        </form>
    </div>

    <!-- پاورقی -->
    <div class="login-footer">© ۱۴۰۳ — تمامی حقوق محفوظ است</div>

</div><!-- /login-wrapper -->

<!-- ===== Bootstrap 5 JS Bundle ===== -->
<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<!-- ===== اسکریپت مشترک پروژه ===== -->
<script src="assets/js/app.js"></script>

<!-- ===== اسکریپت صفحه ورود ===== -->
<script>
(function () {
    // نمایش/مخفی کردن رمز عبور
    var toggle = document.getElementById('togglePass');
    var pass = document.getElementById('password');
    if (toggle && pass) {
        toggle.addEventListener('click', function () {
            var isText = pass.type === 'text';
            pass.type = isText ? 'password' : 'text';
            toggle.querySelector('i').className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
            toggle.setAttribute('aria-label', isText ? 'نمایش رمز عبور' : 'مخفی کردن رمز عبور');
        });
    }

    // ارسال فرم (دمو — اتصال به بک‌اند بعداً)
    var form = document.getElementById('loginForm');
    if (form) {
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }
            // در نسخه واقعی: ارسال به سرور و سپس هدایت به داشبورد
            window.location.href = 'index.html';
        });
    }
})();
</script>
</body>
</html>
