<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#084738">
    <title>شیفت‌ها | مدیریت چایخانه</title>

    <!-- ===== Bootstrap 5 RTL (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- ===== Bootstrap Icons (CDN) ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ===== فونت وزیرمتن (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <!-- ===== استایل مشترک پروژه ===== -->
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>

<!-- ================= Wrapper اصلی ================= -->
<div class="app-wrapper">

    <!-- ====================================================
         صفحه ۱: لیست شیفت‌ها (صفحه اصلی)
    ===================================================== -->
    <div id="page-list">

        <!-- ============ Header ============ -->
        <header class="app-header sticky-top">
            <h1 class="page-title">مدیریت شیفت‌ها</h1>
            <a href="#" class="header-icon" aria-label="پروفایل"><i class="bi bi-person"></i></a>
        </header>

        <!-- ============ Main ============ -->
        <main class="main-content">

            <h2 class="section-title">شیفت‌های تعریف‌شده</h2>

            <!-- لیست شیفت‌ها (Accordion) -->
            <div class="accordion shift-accordion" id="shiftsAccordion">

                <!-- ---- شیفت ۱ ---- -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <div class="accordion-button collapsed shift-head"
                             data-bs-toggle="collapse" data-bs-target="#sh1" role="button">
                            <!-- سمت راست: تاریخ و روز -->
                            <div class="s-date">
                                <span class="day">پنجشنبه</span>
                                <span class="date">۱ خرداد ۱۴۰۳</span>
                            </div>
                            <!-- سمت چپ: ۳ دکمه -->
                            <div class="s-actions" onclick="event.stopPropagation();">
                                <button class="btn-icon view" onclick="showSub('tpl-detail')" aria-label="جزئیات"><i class="bi bi-eye"></i></button>
                                <button class="btn-icon edit" onclick="showSub('tpl-form')" aria-label="ویرایش"><i class="bi bi-pencil"></i></button>
                                <button class="btn-icon del" aria-label="حذف"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </h2>
                    <div id="sh1" class="accordion-collapse collapse" data-bs-parent="#shiftsAccordion">
                        <div class="p-3 pt-0">
                            <small class="text-muted">شعب فعال: مرکزی، شعبه دو · تاخیر مجاز: ۳۰ دقیقه</small>
                        </div>
                    </div>
                </div>

                <!-- ---- شیفت ۲ ---- -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <div class="accordion-button collapsed shift-head"
                             data-bs-toggle="collapse" data-bs-target="#sh2" role="button">
                            <div class="s-date">
                                <span class="day">جمعه</span>
                                <span class="date">۲ خرداد ۱۴۰۳</span>
                            </div>
                            <div class="s-actions" onclick="event.stopPropagation();">
                                <button class="btn-icon view" onclick="showSub('tpl-detail')" aria-label="جزئیات"><i class="bi bi-eye"></i></button>
                                <button class="btn-icon edit" onclick="showSub('tpl-form')" aria-label="ویرایش"><i class="bi bi-pencil"></i></button>
                                <button class="btn-icon del" aria-label="حذف"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </h2>
                    <div id="sh2" class="accordion-collapse collapse" data-bs-parent="#shiftsAccordion">
                        <div class="p-3 pt-0">
                            <small class="text-muted">شعب فعال: هر ۴ شعبه · تاخیر مجاز: ۲۰ دقیقه</small>
                        </div>
                    </div>
                </div>

            </div><!-- /shift-accordion -->

        </main>

        <!-- ============ FAB افزودن شیفت ============ -->
        <a href="#" class="fab" onclick="showSub('tpl-form'); return false;" aria-label="افزودن شیفت">
            <i class="bi bi-plus-lg"></i>
        </a>
    </div><!-- /page-list -->


    <!-- ====================================================
         صفحه ۲: فرم پیچیده افزودن شیفت  (داخل template)
    ===================================================== -->
    <template id="tpl-form">
        <header class="app-header sticky-top">
            <h1 class="page-title">افزودن شیفت</h1>
            <button class="back-btn" onclick="showList()" aria-label="بازگشت"><i class="bi bi-arrow-left"></i></button>
        </header>

        <main class="main-content">
            <form onsubmit="return false;">

                <!-- ===== کارت اول: تاریخ + تاخیر مجاز ===== -->
                <div class="form-card">
                    <div class="row g-2">
                        <div class="col-7">
                            <label class="form-label">تاریخ شیفت</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col-5">
                            <label class="form-label">تاخیر مجاز (دقیقه)</label>
                            <input type="number" class="form-control" value="30" min="0">
                        </div>
                    </div>
                </div>

                <!-- ===== بخش انتخاب شعب (۴ کارت آکاردئونی) ===== -->
                <h2 class="section-title">انتخاب شعب و پاس‌ها</h2>

                <!-- ---- شعبه ۱ ---- -->
                <div class="branch-pick" id="branch1">
                    <div class="branch-header">
                        <input class="form-check-input" type="checkbox" id="b1" onchange="toggleBranch('branch1', this.checked)">
                        <label for="b1">چایخانه مرکزی</label>
                        <i class="bi bi-chevron-down chevron"></i>
                    </div>
                    <div class="branch-body">
                        <!-- پاس ۱ (پیش‌فرض تیک‌خورده) -->
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b1p1" checked
                                       onchange="togglePass('b1p1times', this.checked)">
                                <label for="b1p1">پاس ۱</label>
                            </div>
                            <div class="pass-times show" id="b1p1times">
                                <div class="time-field">
                                    <label class="form-label">شروع</label>
                                    <input type="time" class="form-control" value="15:30">
                                </div>
                                <div class="time-field">
                                    <label class="form-label">پایان</label>
                                    <input type="time" class="form-control" value="20:00">
                                </div>
                            </div>
                        </div>
                        <!-- پاس ۲ (پیش‌فرض تیک‌خورده) -->
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b1p2" checked
                                       onchange="togglePass('b1p2times', this.checked)">
                                <label for="b1p2">پاس ۲</label>
                            </div>
                            <div class="pass-times show" id="b1p2times">
                                <div class="time-field">
                                    <label class="form-label">شروع</label>
                                    <input type="time" class="form-control" value="19:30">
                                </div>
                                <div class="time-field">
                                    <label class="form-label">پایان</label>
                                    <input type="time" class="form-control" value="23:00">
                                </div>
                            </div>
                        </div>
                        <!-- پاس فوق‌العاده (پیش‌فرض بدون تیک) -->
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b1p3"
                                       onchange="togglePass('b1p3times', this.checked)">
                                <label for="b1p3">پاس فوق‌العاده</label>
                            </div>
                            <div class="pass-times" id="b1p3times">
                                <div class="time-field">
                                    <label class="form-label">شروع</label>
                                    <input type="time" class="form-control" value="23:00">
                                </div>
                                <div class="time-field">
                                    <label class="form-label">پایان</label>
                                    <input type="time" class="form-control" value="01:00">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ---- شعبه ۲ ---- -->
                <div class="branch-pick" id="branch2">
                    <div class="branch-header">
                        <input class="form-check-input" type="checkbox" id="b2" onchange="toggleBranch('branch2', this.checked)">
                        <label for="b2">شعبه دو</label>
                        <i class="bi bi-chevron-down chevron"></i>
                    </div>
                    <div class="branch-body">
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b2p1" checked onchange="togglePass('b2p1times', this.checked)">
                                <label for="b2p1">پاس ۱</label>
                            </div>
                            <div class="pass-times show" id="b2p1times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="15:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="20:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b2p2" checked onchange="togglePass('b2p2times', this.checked)">
                                <label for="b2p2">پاس ۲</label>
                            </div>
                            <div class="pass-times show" id="b2p2times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="19:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="23:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b2p3" onchange="togglePass('b2p3times', this.checked)">
                                <label for="b2p3">پاس فوق‌العاده</label>
                            </div>
                            <div class="pass-times" id="b2p3times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="23:00"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="01:00"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ---- شعبه ۳ ---- -->
                <div class="branch-pick" id="branch3">
                    <div class="branch-header">
                        <input class="form-check-input" type="checkbox" id="b3" onchange="toggleBranch('branch3', this.checked)">
                        <label for="b3">شعبه سه</label>
                        <i class="bi bi-chevron-down chevron"></i>
                    </div>
                    <div class="branch-body">
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b3p1" checked onchange="togglePass('b3p1times', this.checked)">
                                <label for="b3p1">پاس ۱</label>
                            </div>
                            <div class="pass-times show" id="b3p1times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="15:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="20:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b3p2" checked onchange="togglePass('b3p2times', this.checked)">
                                <label for="b3p2">پاس ۲</label>
                            </div>
                            <div class="pass-times show" id="b3p2times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="19:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="23:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b3p3" onchange="togglePass('b3p3times', this.checked)">
                                <label for="b3p3">پاس فوق‌العاده</label>
                            </div>
                            <div class="pass-times" id="b3p3times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="23:00"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="01:00"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ---- شعبه ۴ ---- -->
                <div class="branch-pick" id="branch4">
                    <div class="branch-header">
                        <input class="form-check-input" type="checkbox" id="b4" onchange="toggleBranch('branch4', this.checked)">
                        <label for="b4">شعبه چهار</label>
                        <i class="bi bi-chevron-down chevron"></i>
                    </div>
                    <div class="branch-body">
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b4p1" checked onchange="togglePass('b4p1times', this.checked)">
                                <label for="b4p1">پاس ۱</label>
                            </div>
                            <div class="pass-times show" id="b4p1times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="15:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="20:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b4p2" checked onchange="togglePass('b4p2times', this.checked)">
                                <label for="b4p2">پاس ۲</label>
                            </div>
                            <div class="pass-times show" id="b4p2times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="19:30"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="23:00"></div>
                            </div>
                        </div>
                        <div class="pass-block">
                            <div class="pass-check">
                                <input class="form-check-input" type="checkbox" id="b4p3" onchange="togglePass('b4p3times', this.checked)">
                                <label for="b4p3">پاس فوق‌العاده</label>
                            </div>
                            <div class="pass-times" id="b4p3times">
                                <div class="time-field"><label class="form-label">شروع</label><input type="time" class="form-control" value="23:00"></div>
                                <div class="time-field"><label class="form-label">پایان</label><input type="time" class="form-control" value="01:00"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit mt-2">
                    <i class="bi bi-check2-circle"></i> ثبت شیفت
                </button>
            </form>
        </main>
    </template>


    <!-- ====================================================
         صفحه ۳: جزئیات شیفت (مشابه داشبورد)  - داخل template
    ===================================================== -->
    <template id="tpl-detail">
        <header class="app-header sticky-top">
            <h1 class="page-title">جزئیات شیفت</h1>
            <button class="back-btn" onclick="showList()" aria-label="بازگشت"><i class="bi bi-arrow-left"></i></button>
        </header>

        <main class="main-content">
            <div class="welcome-box mb-2">
                <h2 class="section-title">شیفت پنجشنبه ۱ خرداد — چایخانه مرکزی</h2>
            </div>

            <!-- باکس‌های آماری کامل (مشابه داشبورد) -->
            <div class="shift-detail-stats">
                <div class="s-box">
                    <i class="bi bi-person-check-fill ic ic-present"></i>
                    <div class="num">۸</div><div class="lbl">حاضر</div>
                </div>
                <div class="s-box">
                    <i class="bi bi-person-x-fill ic ic-absent"></i>
                    <div class="num">۲</div><div class="lbl">غایب</div>
                </div>
                <div class="s-box">
                    <i class="bi bi-airplane-fill ic ic-leave"></i>
                    <div class="num">۱</div><div class="lbl">مرخصی</div>
                </div>
                <div class="s-box">
                    <i class="bi bi-hourglass-split ic ic-unknown"></i>
                    <div class="num">۳</div><div class="lbl">تاخیر</div>
                </div>
                <div class="s-box">
                    <i class="bi bi-check2-circle ic ic-done"></i>
                    <div class="num">۵</div><div class="lbl">اتمام شیفت</div>
                </div>
                <div class="s-box">
                    <i class="bi bi-people-fill ic ic-done"></i>
                    <div class="num">۱۲</div><div class="lbl">کل پرسنل</div>
                </div>
            </div>

            <h2 class="section-title">پاس‌های این شیفت</h2>
            <div class="form-card">
                <div class="d-flex justify-content-between"><span>پاس ۱</span><span class="text-muted">15:30 - 20:00</span></div>
                <hr class="my-2">
                <div class="d-flex justify-content-between"><span>پاس ۲</span><span class="text-muted">19:30 - 23:00</span></div>
            </div>
        </main>
    </template>


    <!-- محل تزریق صفحات داخلی (ساب‌روتر) -->
    <div id="subpage-container" class="subpage"></div>


    <!-- ============ Bottom Navigation ============ -->
    <nav class="bottom-nav">
        <a href="Dashboard.html" class="nav-item">
            <i class="bi bi-house-door"></i><span>داشبورد</span>
        </a>
        <a href="Attendance.html" class="nav-item">
            <i class="bi bi-check2-square"></i><span>حضور و غیاب</span>
        </a>
        <a href="Personnel.html" class="nav-item">
            <i class="bi bi-people"></i><span>پرسنل</span>
        </a>
        <!-- تب فعال: شیفت‌ها -->
        <a href="Shifts.html" class="nav-item active">
            <i class="bi bi-calendar-week-fill"></i><span>شیفت‌ها</span>
        </a>
    </nav>

</div><!-- /app-wrapper -->

<!-- ===== Bootstrap 5 JS Bundle ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- ===== اسکریپت مشترک پروژه (شامل ساب‌روتر، فرم شیفت و فارسی‌سازی اعداد) ===== -->
<script src="assets/js/app.js"></script>
</body>
</html>
