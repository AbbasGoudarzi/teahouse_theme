<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#084738">
    <title>گزارش‌ها | مدیریت چایخانه</title>

    <!-- ===== Bootstrap 5 RTL (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- ===== Bootstrap Icons (CDN) ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ===== فونت وزیرمتن (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <!-- ===== استایل مشترک پروژه ===== -->
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>

<!-- ================= Wrapper اصلی ================= -->
<div class="app-wrapper">

    <!-- ============ Header ============ -->
    <header class="app-header sticky-top">
        <h1 class="page-title">گزارش‌ها</h1>
        <a href="#" class="header-icon" aria-label="پروفایل">
            <i class="bi bi-person"></i>
        </a>
    </header>

    <!-- ============ Main ============ -->
    <main class="main-content">

        <!-- ===== بخش فیلتر (جستجوی نام + دکمه فیلتر) ===== -->
        <div class="filter-bar">
            <div class="row g-2">
                <div class="col-8">
                    <input type="text" class="form-control" placeholder="جستجوی نام کارمند...">
                </div>
                <div class="col-4">
                    <!-- باز شدن Offcanvas فیلتر -->
                    <button class="btn btn-filter" type="button"
                            data-bs-toggle="offcanvas" data-bs-target="#filterCanvas">
                        <i class="bi bi-funnel-fill"></i>
                        فیلتر
                    </button>
                </div>
            </div>
        </div>

        <h2 class="section-title">لیست گزارش‌ها</h2>

        <!-- ===== لیست گزارش‌ها (Accordion - بدون تگ table) ===== -->
        <div class="accordion report-accordion" id="reportsAccordion">

            <!-- ---- گزارش ۱ ---- -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button"
                            data-bs-toggle="collapse" data-bs-target="#rep1">
                        <div class="report-summary">
                            <span class="emp-name">علی رضایی</span>
                            <span class="emp-meta">
                                <span><i class="bi bi-shop"></i> چایخانه مرکزی</span>
                                <span><i class="bi bi-clock-history"></i> پاس ۱</span>
                                <span class="badge bg-success">حاضر</span>
                            </span>
                        </div>
                    </button>
                </h2>
                <div id="rep1" class="accordion-collapse collapse" data-bs-parent="#reportsAccordion">
                    <div class="report-detail">
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-in-left"></i> ساعت ورود</span>
                            <span class="value">15:35</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-right"></i> ساعت خروج</span>
                            <span class="value">20:05</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-hourglass-split"></i> مدت تاخیر</span>
                            <span class="value text-warning">۵ دقیقه</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ---- گزارش ۲ ---- -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button"
                            data-bs-toggle="collapse" data-bs-target="#rep2">
                        <div class="report-summary">
                            <span class="emp-name">مریم احمدی</span>
                            <span class="emp-meta">
                                <span><i class="bi bi-shop"></i> شعبه دو</span>
                                <span><i class="bi bi-clock-history"></i> پاس ۲</span>
                                <span class="badge bg-warning text-dark">تاخیر</span>
                            </span>
                        </div>
                    </button>
                </h2>
                <div id="rep2" class="accordion-collapse collapse" data-bs-parent="#reportsAccordion">
                    <div class="report-detail">
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-in-left"></i> ساعت ورود</span>
                            <span class="value">19:45</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-right"></i> ساعت خروج</span>
                            <span class="value">23:00</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-hourglass-split"></i> مدت تاخیر</span>
                            <span class="value text-warning">۱۵ دقیقه</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ---- گزارش ۳ ---- -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button"
                            data-bs-toggle="collapse" data-bs-target="#rep3">
                        <div class="report-summary">
                            <span class="emp-name">حسین کریمی</span>
                            <span class="emp-meta">
                                <span><i class="bi bi-shop"></i> شعبه سه</span>
                                <span><i class="bi bi-clock-history"></i> پاس ۱</span>
                                <span class="badge bg-danger">غایب</span>
                            </span>
                        </div>
                    </button>
                </h2>
                <div id="rep3" class="accordion-collapse collapse" data-bs-parent="#reportsAccordion">
                    <div class="report-detail">
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-in-left"></i> ساعت ورود</span>
                            <span class="value">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-right"></i> ساعت خروج</span>
                            <span class="value">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-hourglass-split"></i> مدت تاخیر</span>
                            <span class="value">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ---- گزارش ۴ ---- -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button"
                            data-bs-toggle="collapse" data-bs-target="#rep4">
                        <div class="report-summary">
                            <span class="emp-name">زهرا موسوی</span>
                            <span class="emp-meta">
                                <span><i class="bi bi-shop"></i> شعبه چهار</span>
                                <span><i class="bi bi-clock-history"></i> پاس ۲</span>
                                <span class="badge bg-info text-dark">مرخصی</span>
                            </span>
                        </div>
                    </button>
                </h2>
                <div id="rep4" class="accordion-collapse collapse" data-bs-parent="#reportsAccordion">
                    <div class="report-detail">
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-in-left"></i> ساعت ورود</span>
                            <span class="value">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-right"></i> ساعت خروج</span>
                            <span class="value">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="label"><i class="bi bi-info-circle"></i> توضیح</span>
                            <span class="value text-info">مرخصی استحقاقی</span>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /report-accordion -->

    </main>

    <!-- ============ Bottom Navigation ============ -->
    <nav class="bottom-nav">
        <a href="Dashboard.html" class="nav-item">
            <i class="bi bi-house-door"></i>
            <span>داشبورد</span>
        </a>
        <!-- تب فعال: گزارش‌ها -->
        <a href="Reports.html" class="nav-item active">
            <i class="bi bi-list-ul"></i>
            <span>گزارش‌ها</span>
        </a>
        <a href="Personnel.html" class="nav-item">
            <i class="bi bi-people"></i>
            <span>پرسنل</span>
        </a>
        <a href="Shifts.html" class="nav-item">
            <i class="bi bi-calendar-week"></i>
            <span>شیفت‌ها</span>
        </a>
    </nav>

</div><!-- /app-wrapper -->

<!-- ============ Offcanvas فیلتر (باز شدن از پایین) ============ -->
<div class="offcanvas offcanvas-bottom filter-canvas" tabindex="-1" id="filterCanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="bi bi-funnel"></i> فیلتر گزارش‌ها</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="بستن"></button>
    </div>
    <div class="offcanvas-body">
        <div class="row g-3">
            <!-- انتخاب شعبه -->
            <div class="col-12">
                <label class="form-label">شعبه</label>
                <select class="form-select">
                    <option selected>همه شعب</option>
                    <option value="1">چایخانه مرکزی</option>
                    <option value="2">شعبه دو</option>
                    <option value="3">شعبه سه</option>
                    <option value="4">شعبه چهار</option>
                </select>
            </div>
            <!-- انتخاب تاریخ -->
            <div class="col-12">
                <label class="form-label">تاریخ</label>
                <input type="date" class="form-control">
            </div>
            <!-- انتخاب وضعیت -->
            <div class="col-12">
                <label class="form-label">وضعیت</label>
                <select class="form-select">
                    <option selected>همه وضعیت‌ها</option>
                    <option value="present">حاضر</option>
                    <option value="absent">غایب</option>
                    <option value="late">تاخیر</option>
                    <option value="leave">مرخصی</option>
                </select>
            </div>
            <!-- دکمه اعمال -->
            <div class="col-12">
                <button class="btn btn-apply" type="button" data-bs-dismiss="offcanvas">
                    <i class="bi bi-check2-circle"></i> اعمال فیلتر
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Bootstrap 5 JS Bundle ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- ===== اسکریپت مشترک پروژه ===== -->
<script src="assets/js/app.js"></script>
</body>
</html>
