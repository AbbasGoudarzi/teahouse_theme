<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#084738">
    <title>گزارش‌ها | مدیریت چایخانه</title>

    <!-- ===== Bootstrap 5 RTL (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- ===== Bootstrap Icons (CDN) ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ===== فونت وزیرمتن (CDN) ===== -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

    <!-- ============================================================
         استایل‌های عمومی (Base Rules) - مشترک بین تمام صفحات
         در آینده این بخش به یک فایل app.css منتقل می‌شود
    ============================================================= -->
    <style>
        :root {
            --brand-green: #084738;
            --brand-green-light: #0d6b53;
            --body-bg: #f8f9fa;
            --card-shadow: 0 2px 12px rgba(0, 0, 0, .06);
        }

        * { font-family: 'Vazirmatn', Tahoma, sans-serif; }

        body { background-color: #e9ecef; margin: 0; }

        /* ----- Wrapper اصلی ----- */
        .app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            background-color: var(--body-bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, .05);
            overflow-x: hidden;
        }

        /* ====================== Header ====================== */
        .app-header {
            background: linear-gradient(135deg, var(--brand-green-light) 0%, var(--brand-green) 100%);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(8, 71, 56, .25);
        }
        .app-header .page-title { font-size: 1.15rem; font-weight: 700; margin: 0; }
        .app-header .header-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.3rem; text-decoration: none;
        }

        /* ====================== Main ====================== */
        .main-content { padding: 16px; }

        /* ====================== Bottom Navigation ====================== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: #fff;
            display: flex; justify-content: space-around; align-items: center;
            padding: 6px 4px;
            border-top-left-radius: 18px; border-top-right-radius: 18px;
            box-shadow: 0 -3px 14px rgba(0, 0, 0, .08);
            z-index: 1030;
        }
        .bottom-nav .nav-item {
            flex: 1; text-align: center; text-decoration: none;
            color: #9aa0a6; font-size: .72rem; padding: 6px 0;
            min-height: 44px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            transition: color .2s;
        }
        .bottom-nav .nav-item i { font-size: 1.35rem; }
        .bottom-nav .nav-item.active { color: var(--brand-green); font-weight: 700; }

        .btn, .nav-item, .form-control, .form-select { min-height: 44px; }

        .btn-brand { background-color: var(--brand-green); border-color: var(--brand-green); color: #fff; }
        .btn-brand:hover, .btn-brand:focus { background-color: #063a2d; color: #fff; }

        .section-title {
            font-size: .95rem; font-weight: 700; color: #343a40;
            margin: 4px 0 14px; padding-right: 10px;
            border-right: 4px solid var(--brand-green);
        }

        /* ====================== بخش فیلتر بالای صفحه ====================== */
        .filter-bar { margin-bottom: 16px; }
        .filter-bar .form-control {
            border-radius: 12px; border: 1px solid #e3e6e9; background: #fff;
        }
        .filter-bar .btn-filter {
            width: 100%; border-radius: 12px;
            background: var(--brand-green); color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-weight: 600;
        }
        .filter-bar .btn-filter:hover { background: #063a2d; color: #fff; }

        /* ====================== لیست گزارش‌ها (Accordion) ====================== */
        .report-accordion .accordion-item {
            border: 1px solid #f0f0f0;
            border-radius: 14px !important;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        .report-accordion .accordion-button {
            padding: 14px;
            background: #fff;
            box-shadow: none;
            border-radius: 14px !important;
        }
        .report-accordion .accordion-button:not(.collapsed) {
            background: #fff; color: inherit;
        }
        .report-accordion .accordion-button:focus { box-shadow: none; }
        /* جابه‌جایی فلش به سمت چپ در حالت RTL */
        .report-accordion .accordion-button::after { margin-right: auto; margin-left: 0; }

        /* محتوای خلاصه (حالت بسته) */
        .report-summary { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        .report-summary .emp-name { font-weight: 700; font-size: 1rem; color: #212529; }
        .report-summary .emp-meta {
            font-size: .78rem; color: #6c757d;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .report-summary .emp-meta span { display: flex; align-items: center; gap: 3px; }

        /* جزئیات (حالت باز) */
        .report-detail { padding: 0 14px 14px; }
        .report-detail .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 0; border-top: 1px dashed #eef0f2; font-size: .85rem;
        }
        .report-detail .detail-row .label { color: #6c757d; display: flex; align-items: center; gap: 5px; }
        .report-detail .detail-row .value { font-weight: 600; color: #212529; }

        /* ====================== Offcanvas فیلتر ====================== */
        /* ارتفاع به اندازه محتوا (بدون اسکرول اضافی) */
        .offcanvas.offcanvas-bottom.filter-canvas {
            height: auto;
            max-width: 480px; margin: 0 auto;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        .filter-canvas .offcanvas-header { padding-bottom: 4px; }
        .filter-canvas .offcanvas-title { font-weight: 700; }
        .filter-canvas .form-label { font-size: .85rem; font-weight: 600; color: #495057; margin-bottom: 4px; }
        .filter-canvas .form-control, .filter-canvas .form-select {
            border-radius: 12px; border: 1px solid #e3e6e9;
        }
        .filter-canvas .btn-apply {
            width: 100%; border-radius: 12px;
            background: var(--brand-green); color: #fff; font-weight: 700;
            padding: 12px; margin-top: 6px;
        }
        .filter-canvas .btn-apply:hover { background: #063a2d; color: #fff; }
    </style>
</head>
<body>

<!-- ================= Wrapper اصلی ================= -->
<div class="app-wrapper">

    <!-- ============ Header ============ -->
    <header class="app-header sticky-top">
        <h1 class="page-title">گزارش‌ها</h1>
        <a href="#" class="header-icon" aria-label="پروفایل">

    </header>

    <!-- ============ Main ============ -->

                            <span class="value text-warning">۵ دقیقه</span>

                    </div>
                </div>
            </div>

            <!-- ---- گزارش ۲ ---- -->

                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button"

                            </span>

                            <span class="label"><i class="bi bi-box-arrow-in-left"></i> ساعت ورود</span>

                        <div class="detail-row">
                            <span class="label"><i class="bi bi-box-arrow-right"></i> ساعت خروج</span>

                        <div class="detail-row">
                            <span class="label"><i class="bi bi-hourglass-split"></i> مدت تاخیر</span>
                            <span class="value">—</span>

                    </div>

            <!-- ---- گزارش ۴ ---- -->

    <!-- ============ Bottom Navigation ============ -->

<!-- ============ Offcanvas فیلتر (باز شدن از پایین) ============ -->
<div class="offcanvas offcanvas-bottom filter-canvas" tabindex="-1" id="filterCanvas">

        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="بستن"></button>
    </div>
    <div class="offcanvas-body">
        <div class="row g-3">
            <!-- انتخاب شعبه -->
            <div class="col-12">
                <label class="form-label">شعبه</label>
                <select class="form-select">
                    <option selected>همه شعب</option>
                    <option value="1">چایخانه مرکزی</option>
                    <option value="2">شعبه دو</option>
                    <option value="3">شعبه سه</option>
                    <option value="4">شعبه چهار</option>
                </select>
            </div>
            <!-- انتخاب تاریخ -->
            <div class="col-12">
                <label class="form-label">تاریخ</label>
                <input type="date" class="form-control">
            </div>
            <!-- انتخاب وضعیت -->
            <div class="col-12">
                <label class="form-label">وضعیت</label>
                <select class="form-select">
                    <option selected>همه وضعیت‌ها</option>
                    <option value="present">حاضر</option>
                    <option value="absent">غایب</option>
                    <option value="late">تاخیر</option>
                    <option value="leave">مرخصی</option>
                </select>
            </div>
            <!-- دکمه اعمال -->
            <div class="col-12">
                <button class="btn btn-apply" type="button" data-bs-dismiss="offcanvas">
                    <i class="bi bi-check2-circle"></i> اعمال فیلتر
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Bootstrap 5 JS Bundle ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ============================================================
     اسکریپت تبدیل اعداد لاتین به فارسی (مشترک تمام صفحات)
============================================================= -->
<script>
    (function () {
        const FA_DIGITS = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
        function toFa(str) { return str.replace(/[0-9]/g, d => FA_DIGITS[d]); }

        window.persianizeDigits = function (root) {
            root = root || document.querySelector('.app-wrapper');
            if (!root) return;
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
            let node;
            while ((node = walker.nextNode())) {
                const parentTag = node.parentNode.nodeName;
                if (parentTag === 'SCRIPT' || parentTag === 'STYLE') continue;
                if (/[0-9]/.test(node.nodeValue)) node.nodeValue = toFa(node.nodeValue);
            }
        };
        document.addEventListener('DOMContentLoaded', () => persianizeDigits());
    })();
</script>
</body>
