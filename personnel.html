<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#084738">
    <title>پرسنل | مدیریت چایخانه</title>

    <!-- ===== Bootstrap 5 RTL (محلی) ===== -->
    <link href="assets/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- ===== Bootstrap Icons (محلی) ===== -->
    <link rel="stylesheet" href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css">
    <!-- ===== فونت وزیرمتن (محلی) ===== -->
    <link href="assets/vendor/vazirmatn/vazirmatn.css" rel="stylesheet">
    <!-- ===== استایل مشترک پروژه ===== -->
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>

<!-- ================= Wrapper اصلی ================= -->
<div class="app-wrapper">

    <!-- ====================================================
         صفحه ۱: لیست پرسنل (صفحه اصلی)
    ===================================================== -->
    <div id="page-list">

        <!-- ============ Header ============ -->
        <header class="app-header sticky-top">
            <h1 class="page-title">پرسنل</h1>
            <a href="#" class="header-icon" aria-label="پروفایل"><i class="bi bi-person"></i></a>
        </header>

        <!-- ============ Main ============ -->
        <main class="main-content">

            <!-- نوار جستجو -->
            <div class="search-bar">
                <i class="bi bi-search search-icon"></i>
                <input type="text" class="form-control" placeholder="جستجوی نام کارمند...">
            </div>

            <h2 class="section-title">لیست کارکنان</h2>

            <!-- ---- کارت کارمند ۱ ---- -->
            <div class="person-card">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div class="person-info">
                    <div class="name">علی رضایی</div>
                    <div class="sub">چایخانه مرکزی · 09121234567</div>
                </div>
                <div class="actions">
                    <button class="btn-icon view" onclick="showSub('tpl-detail')" aria-label="جزئیات"><i class="bi bi-eye"></i></button>
                    <button class="btn-icon edit" onclick="showSub('tpl-form')" aria-label="ویرایش"><i class="bi bi-pencil"></i></button>
                    <button class="btn-icon del" aria-label="حذف"><i class="bi bi-trash"></i></button>
                </div>
            </div>

            <!-- ---- کارت کارمند ۲ ---- -->
            <div class="person-card">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div class="person-info">
                    <div class="name">مریم احمدی</div>
                    <div class="sub">شعبه دو · 09127654321</div>
                </div>
                <div class="actions">
                    <button class="btn-icon view" onclick="showSub('tpl-detail')" aria-label="جزئیات"><i class="bi bi-eye"></i></button>
                    <button class="btn-icon edit" onclick="showSub('tpl-form')" aria-label="ویرایش"><i class="bi bi-pencil"></i></button>
                    <button class="btn-icon del" aria-label="حذف"><i class="bi bi-trash"></i></button>
                </div>
            </div>

            <!-- ---- کارت کارمند ۳ ---- -->
            <div class="person-card">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div class="person-info">
                    <div class="name">حسین کریمی</div>
                    <div class="sub">شعبه سه · 09120009988</div>
                </div>
                <div class="actions">
                    <button class="btn-icon view" onclick="showSub('tpl-detail')" aria-label="جزئیات"><i class="bi bi-eye"></i></button>
                    <button class="btn-icon edit" onclick="showSub('tpl-form')" aria-label="ویرایش"><i class="bi bi-pencil"></i></button>
                    <button class="btn-icon del" aria-label="حذف"><i class="bi bi-trash"></i></button>
                </div>
            </div>

        </main>

        <!-- ============ دکمه شناور FAB (افزودن پرسنل) ============ -->
        <a href="#" class="fab" onclick="showSub('tpl-form'); return false;" aria-label="افزودن پرسنل">
            <i class="bi bi-plus-lg"></i>
        </a>
    </div><!-- /page-list -->


    <!-- ====================================================
         صفحه ۲: فرم افزودن/ویرایش پرسنل  (داخل template)
         این بخش بعداً به یک View مجزای Blade تبدیل می‌شود
    ===================================================== -->
    <template id="tpl-form">
        <header class="app-header sticky-top">
            <h1 class="page-title">افزودن پرسنل</h1>
            <!-- دکمه بازگشت سمت چپ -->
            <button class="back-btn" onclick="showList()" aria-label="بازگشت"><i class="bi bi-arrow-left"></i></button>
        </header>

        <main class="main-content">
            <form onsubmit="return false;">
                <div class="mb-3">
                    <label class="form-label">نام و نام خانوادگی</label>
                    <input type="text" class="form-control" placeholder="مثلاً علی رضایی">
                </div>
                <div class="mb-3">
                    <label class="form-label">شماره موبایل</label>
                    <input type="tel" class="form-control" placeholder="09xxxxxxxxx" dir="ltr">
                </div>
                <div class="mb-3">
                    <label class="form-label">چایخانه</label>
                    <select class="form-select">
                        <option selected disabled>انتخاب چایخانه...</option>
                        <option value="1">چایخانه مرکزی</option>
                        <option value="2">شعبه دو</option>
                        <option value="3">شعبه سه</option>
                        <option value="4">شعبه چهار</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">تاریخ تولد</label>
                    <input type="date" class="form-control">
                </div>
                <button type="submit" class="btn btn-submit">
                    <i class="bi bi-check2-circle"></i> ثبت پرسنل
                </button>
            </form>
        </main>
    </template>


    <!-- ====================================================
         صفحه ۳: جزئیات پرسنل  (داخل template)
    ===================================================== -->
    <template id="tpl-detail">
        <header class="app-header sticky-top">
            <h1 class="page-title">جزئیات پرسنل</h1>
            <button class="back-btn" onclick="showList()" aria-label="بازگشت"><i class="bi bi-arrow-left"></i></button>
        </header>

        <main class="main-content">

            <!-- مشخصات کلی -->
            <div class="person-card mb-3">
                <div class="avatar"><i class="bi bi-person-fill"></i></div>
                <div class="person-info">
                    <div class="name">علی رضایی</div>
                    <div class="sub">چایخانه مرکزی · 09121234567</div>
                </div>
            </div>

            <!-- ۴ باکس آماری -->
            <div class="detail-stats">
                <div class="d-stat">
                    <div class="num">۲۶</div>
                    <div class="lbl">شیفت موظف</div>
                </div>
                <div class="d-stat">
                    <div class="num">۲۲</div>
                    <div class="lbl">انجام شده</div>
                </div>
                <div class="d-stat">
                    <div class="num">۳</div>
                    <div class="lbl">مرخصی</div>
                </div>
                <div class="d-stat">
                    <div class="num">۱</div>
                    <div class="lbl">غیبت</div>
                </div>
            </div>

            <h2 class="section-title">سوابق حضور</h2>

            <!-- لیست سوابق (جایگزین جدول) با border-right رنگی -->
            <div class="history-row st-present">
                <div class="h-top">
                    <div class="h-place"><i class="bi bi-shop"></i> چایخانه مرکزی</div>
                    <div class="h-date">۱ خرداد ۱۴۰۳</div>
                </div>
                <div class="h-times">
                    <span><i class="bi bi-box-arrow-in-left"></i> ورود: 15:32</span>
                    <span><i class="bi bi-box-arrow-right"></i> خروج: 20:05</span>
                </div>
            </div>

            <div class="history-row st-late">
                <div class="h-top">
                    <div class="h-place"><i class="bi bi-shop"></i> چایخانه مرکزی</div>
                    <div class="h-date">۳۱ اردیبهشت ۱۴۰۳</div>
                </div>
                <div class="h-times">
                    <span><i class="bi bi-box-arrow-in-left"></i> ورود: 15:50</span>
                    <span><i class="bi bi-box-arrow-right"></i> خروج: 20:00</span>
                </div>
            </div>

            <div class="history-row st-leave">
                <div class="h-top">
                    <div class="h-place"><i class="bi bi-shop"></i> چایخانه مرکزی</div>
                    <div class="h-date">۳۰ اردیبهشت ۱۴۰۳</div>
                </div>
                <div class="h-times">
                    <span><i class="bi bi-info-circle"></i> مرخصی استحقاقی</span>
                </div>
            </div>

            <div class="history-row st-absent">
                <div class="h-top">
                    <div class="h-place"><i class="bi bi-shop"></i> چایخانه مرکزی</div>
                    <div class="h-date">۲۹ اردیبهشت ۱۴۰۳</div>
                </div>
                <div class="h-times">
                    <span><i class="bi bi-x-circle"></i> غیبت ثبت شده</span>
                </div>
            </div>

        </main>
    </template>


    <!-- محل تزریق صفحات داخلی (ساب‌روتر) -->
    <div id="subpage-container" class="subpage"></div>


    <!-- ============ Bottom Navigation ============ -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-door"></i><span>داشبورد</span>
        </a>
        <a href="attendance.html" class="nav-item">
            <i class="bi bi-check2-square"></i><span>حضور و غیاب</span>
        </a>
        <!-- تب فعال: پرسنل -->
        <a href="personnel.html" class="nav-item active">
            <i class="bi bi-people-fill"></i><span>پرسنل</span>
        </a>
        <a href="shifts.html" class="nav-item">
            <i class="bi bi-calendar-week"></i><span>شیفت‌ها</span>
        </a>
    </nav>

</div><!-- /app-wrapper -->

<!-- ===== Bootstrap 5 JS Bundle ===== -->
<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<!-- ===== اسکریپت مشترک پروژه (شامل ساب‌روتر و فارسی‌سازی اعداد) ===== -->
<script src="assets/js/app.js"></script>
</body>
</html>
